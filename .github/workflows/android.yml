name: Build Slim Spider JAR

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Clean and Build (Without Dependencies)
        # 关键：只编译，不打包依赖
        run: ./gradlew clean classes

      - name: Create Slim JAR
        # 手动使用 jar 命令打包，只包含我们需要的类
        run: |
          # 进入编译输出目录
          cd build/classes/java/main
          
          # 1. 打包 com/github/catvod/crawler 下的所有文件
          # 2. 排除 android、kotlin、okhttp3 等第三方库
          jar cf spider-slim.jar \
            com/github/catvod/crawler/*.class \
            com/github/catvod/crawler/bean/*.class 2>/dev/null || true
          
          # 检查文件大小
          ls -lh spider-slim.jar

          # 移动回工作目录根路径以便上传
          mv spider-slim.jar $GITHUB_WORKSPACE/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spider-slim
          path: app/spider-slim.jar
