name: Build & Release Slim Spider JAR

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission
        run: chmod +x ./gradlew

      - name: Compile Project
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Extract & Slim JAR
        run: |
          # 1. 自动定位 Android 编译生成的 classes.jar
          ORIGINAL_JAR=$(find app/build -name "classes.jar" | head -n 1)
          
          if [ -z "$ORIGINAL_JAR" ]; then
            echo "Error: classes.jar not found!"
            exit 1
          fi
          
          echo "Found original jar: $ORIGINAL_JAR"
          
          # 2. 解压并瘦身
          mkdir -p temp_jar && cd temp_jar
          jar xf "$ORIGINAL_JAR"
          
          # 【核心瘦身】删除 Android 特有和无用文件
          rm -rf android/ res/ assets/ META-INF/ 
          rm -f R.class BuildConfig.class
          
          # 3. 重新打包为 spider.jar
          jar cf ../spider.jar *
          cd .. && rm -rf temp_jar
          
          echo "Slim jar created successfully."
          ls -lh spider.jar

      - name: Create GitHub Release & Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Spider JAR Build #${{ github.run_number }}
          files: spider.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
