name: Build Slim Spider JAR

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission
        run: chmod +x ./gradlew

      - name: Build Project
        # 执行构建，跳过测试加快速度
        run: ./gradlew clean assemble --no-daemon

      - name: Optimize & Rename JAR
        run: |
          cd build/libs
          
          # 1. 找到生成的 jar 包 (排除 sources 和 javadoc)
          ORIGINAL_JAR=$(ls *.jar | grep -v "sources" | grep -v "javadoc" | head -n 1)
          echo "Found original jar: $ORIGINAL_JAR"
          
          if [ -z "$ORIGINAL_JAR" ]; then
            echo "Error: No jar file found!"
            exit 1
          fi

          # 2. 创建临时目录进行瘦身操作
          mkdir temp_jar
          cd temp_jar
          
          # 3. 解压原始 jar
          jar xf ../$ORIGINAL_JAR
          
          # 4. 【核心瘦身】删除不需要的依赖和资源
          # 删除 Android 相关
          rm -rf android/
          # 删除 Kotlin 标准库 (如果不需要)
          rm -rf kotlin/
          # 删除常见的第三方依赖 (假设运行环境已提供)
          rm -rf okhttp3/ okio/ jsoup/ org/json/ com/google/gson/
          # 删除 Android 签名文件
          rm -rf META-INF/*.RSA META-INF/*.SF META-INF/*.DSA
          
          # 5. 重新打包为 spider.jar
          jar cf ../spider.jar .
          
          cd ..
          rm -rf temp_jar $ORIGINAL_JAR
          
          echo "Slim jar created successfully."
          ls -lh spider.jar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spider-jar-release
          path: build/libs/spider.jar
